<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>404 · Page Not Found — Sujal Wagholikar</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Sujal Wagholikar's portfolio." />
    <meta name="robots" content="noindex, follow" />

    <link rel="canonical" href="https://www.sujalwagholikar.info/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

    <style>
        /* ── Reset ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            height: 100%;
        }
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.45s ease, color 0.45s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* ── Dual Theme Variables ── */
        :root {
            --bg: #f8f7f5;
            --surface: #ffffff;
            --surface-border: #eeede9;
            --text: #1a1917;
            --text-secondary: #6b6967;
            --text-muted: #b0aea8;
            --accent: #1a1917;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.04);
            --transition: 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        [data-theme="dark"] {
            --bg: #121110;
            --surface: #1e1d1b;
            --surface-border: #2a2826;
            --text: #f0eeeb;
            --text-secondary: #a8a49e;
            --text-muted: #5e5b57;
            --accent: #f0eeeb;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        /* ── Container ── */
        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            box-shadow: var(--shadow);
            padding: 4rem 4.5rem;
            min-height: 480px;
            position: relative;
            transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
        }

        /* ── Left: Error Details ── */
        .error-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.75rem;
        }

        .error-code {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(5rem, 10vw, 8rem);
            font-weight: 500;
            line-height: 1;
            color: var(--text);
            letter-spacing: -0.02em;
            transition: color var(--transition);
        }

        .error-title {
            font-size: clamp(1.2rem, 2.2vw, 1.8rem);
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.01em;
            margin-top: 0.25rem;
            transition: color var(--transition);
        }

        .error-desc {
            font-size: 0.92rem;
            font-weight: 300;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 380px;
            margin-top: 0.5rem;
            transition: color var(--transition);
        }

        .error-hint {
            margin-top: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            transition: color var(--transition);
        }
        .error-hint span {
            display: inline-block;
            animation: blink 1.4s step-end infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* ── Right: Logo + Back ── */
        .error-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.2rem;
            position: relative;
        }

        /* Logo wrapper with animations */
        .logo-wrap {
            position: relative;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--surface-border);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.06);
            transition: border-color var(--transition), box-shadow var(--transition);
            flex-shrink: 0;
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(12%);
            transition: filter 0.6s ease;
        }

        /* ── Motion effects ── */
        .logo-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            pointer-events: none;
            z-index: 0;
        }
        .logo-ring-1 {
            border-top-color: var(--text);
            border-right-color: transparent;
            border-bottom-color: transparent;
            border-left-color: transparent;
            animation: spin-ring 8s linear infinite;
            opacity: 0.25;
        }
        .logo-ring-2 {
            inset: -16px;
            border-top-color: transparent;
            border-right-color: var(--text);
            border-bottom-color: transparent;
            border-left-color: transparent;
            animation: spin-ring 12s linear infinite reverse;
            opacity: 0.15;
        }
        .logo-ring-3 {
            inset: -24px;
            border-top-color: transparent;
            border-right-color: transparent;
            border-bottom-color: var(--text);
            border-left-color: transparent;
            animation: spin-ring 16s linear infinite;
            opacity: 0.10;
        }

        @keyframes spin-ring {
            to {
                transform: rotate(360deg);
            }
        }

        /* Floating animation for the logo */
        .logo-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Glow pulse behind logo */
        .logo-glow {
            position: absolute;
            inset: -40px;
            border-radius: 50%;
            background: radial-gradient(circle at center, var(--text) 0%, transparent 70%);
            opacity: 0.04;
            filter: blur(30px);
            animation: glow-pulse 3s ease-in-out infinite alternate;
            transition: opacity var(--transition);
        }
        @keyframes glow-pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.03;
            }
            100% {
                transform: scale(1.2);
                opacity: 0.08;
            }
        }

        /* ── Back button ── */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.8rem;
            background: transparent;
            color: var(--text);
            border: 1px solid var(--surface-border);
            border-radius: 40px;
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            transition: background var(--transition), color var(--transition), border-color var(--transition), transform 0.2s ease, gap 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .back-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--text);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
            border-radius: 40px;
            z-index: 0;
        }

        .back-btn:hover {
            gap: 1rem;
            border-color: var(--text);
        }

        .back-btn:hover::after {
            transform: scaleX(1);
        }

        .back-btn span {
            position: relative;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .back-btn .arrow {
            position: relative;
            z-index: 1;
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .back-btn:hover .arrow {
            transform: translateX(4px) rotate(-8deg);
        }

        .back-btn:hover span {
            color: var(--bg);
        }

        /* ── Theme Toggle ── */
        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: 1px solid var(--surface-border);
            border-radius: 40px;
            padding: 0.45rem 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            cursor: pointer;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
            transition: border-color var(--transition), color var(--transition), background var(--transition);
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--surface);
        }
        .theme-toggle:hover {
            border-color: var(--text);
            color: var(--text);
        }
        .theme-toggle .icon {
            font-size: 0.85rem;
            line-height: 1;
            transition: transform 0.4s ease;
        }
        .theme-toggle:hover .icon {
            transform: rotate(25deg);
        }

        /* ── Responsive ── */
        @media (max-width: 820px) {
            .container {
                grid-template-columns: 1fr;
                gap: 2.5rem;
                padding: 3rem 2.5rem;
                min-height: auto;
                border-radius: 10px;
            }
            .error-left {
                order: 2;
                text-align: center;
                align-items: center;
            }
            .error-desc {
                max-width: 100%;
            }
            .error-right {
                order: 1;
                gap: 1.8rem;
            }
            .logo-wrap {
                width: 140px;
                height: 140px;
            }
            .error-code {
                font-size: clamp(4rem, 12vw, 6rem);
            }
            .theme-toggle {
                top: 1.2rem;
                right: 1.2rem;
                padding: 0.35rem 0.8rem;
                font-size: 0.6rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            .container {
                padding: 2rem 1.5rem;
                gap: 2rem;
                border-radius: 8px;
            }
            .logo-wrap {
                width: 110px;
                height: 110px;
            }
            .logo-ring-2 {
                display: none;
            }
            .logo-ring-3 {
                display: none;
            }
            .error-code {
                font-size: 3.6rem;
            }
            .error-title {
                font-size: 1.1rem;
            }
            .error-desc {
                font-size: 0.85rem;
            }
            .back-btn {
                padding: 0.6rem 1.4rem;
                font-size: 0.7rem;
            }
            .theme-toggle {
                top: 0.8rem;
                right: 0.8rem;
                padding: 0.3rem 0.7rem;
                font-size: 0.55rem;
            }
            .theme-toggle .icon {
                font-size: 0.7rem;
            }
        }

        /* ── Scrollbar (minimal) ── */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ── Entrance animation ── */
        .container {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            animation: entrance 0.7s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        @keyframes entrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .error-left>* {
            opacity: 0;
            transform: translateX(-18px);
            animation: slide-in 0.6s ease forwards;
        }
        .error-left .error-code {
            animation-delay: 0.1s;
        }
        .error-left .error-title {
            animation-delay: 0.2s;
        }
        .error-left .error-desc {
            animation-delay: 0.3s;
        }
        .error-left .error-hint {
            animation-delay: 0.45s;
        }

        @keyframes slide-in {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .error-right .logo-wrap {
            opacity: 0;
            transform: scale(0.85);
            animation: pop-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.25s;
        }
        @keyframes pop-in {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .error-right .back-btn {
            opacity: 0;
            transform: translateY(12px);
            animation: fade-up 0.5s ease forwards 0.5s;
        }
        @keyframes fade-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-toggle {
            opacity: 0;
            animation: fade-up 0.4s ease forwards 0.6s;
        }
    </style>
</head>
<body>

    <div class="container" role="main">

        <!-- Theme Toggle -->
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span class="icon" id="themeIcon">☀</span>
            <span id="themeLabel">Light</span>
        </button>

        <!-- Left: Error Details -->
        <div class="error-left">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page not found</h2>
            <p class="error-desc">
                The page you're looking for doesn't exist or has been moved.
                Head back to the portfolio to explore my work.
            </p>
            <div class="error-hint">
                <span>●</span> Return to safety
            </div>
        </div>

        <!-- Right: Logo + Back -->
        <div class="error-right">

            <!-- Glow -->
            <div class="logo-glow"></div>

            <!-- Logo with rings -->
            <div class="logo-wrap logo-float">
                <img
                src="https://i.postimg.cc/tRtwtZM6/sujal-png.jpg"
                alt="Sujal Wagholikar — Full Stack Developer"
                width="180"
                height="180"
                loading="eager"
                fetchpriority="high"
                />
                <div class="logo-ring logo-ring-1"></div>
                <div class="logo-ring logo-ring-2"></div>
                <div class="logo-ring logo-ring-3"></div>
            </div>

            <!-- Back button -->
            <a href="https://www.sujalwagholikar.info/" class="back-btn">
                <span>Back to Home</span>
                <span class="arrow">→</span>
            </a>

        </div>

    </div>

    <script>
        /* ── Dual Theme Toggle ── */
        (function() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');

            // Detect saved preference or system
            const stored = localStorage.getItem('sw_theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            let currentTheme = stored || (prefersDark ? 'dark' : 'light');

            function applyTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                if (theme === 'dark') {
                    icon.textContent = '☽';
                    label.textContent = 'Dark';
                } else {
                    icon.textContent = '☀';
                    label.textContent = 'Light';
                }
                localStorage.setItem('sw_theme', theme);
                currentTheme = theme;
            }

            applyTheme(currentTheme);

            toggle.addEventListener('click', () => {
                const next = currentTheme === 'light' ? 'dark' : 'light';
                applyTheme(next);
            });

            // Listen for system changes (optional)
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (!localStorage.getItem('sw_theme')) {
                    applyTheme(e.matches ? 'dark' : 'light');
                }
            });
        })();
    </script>

</body>
</html>
